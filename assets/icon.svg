<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c2d30" />
      <stop offset="50%" stop-color="#202124" />
      <stop offset="100%" stop-color="#161719" />
    </linearGradient>

    <linearGradient id="topGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3b3e" />
      <stop offset="100%" stop-color="#2f3033" />
    </linearGradient>

    <linearGradient id="frontSlope" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2022" />
      <stop offset="100%" stop-color="#111213" />
    </linearGradient>

    <linearGradient id="innerHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4b4e" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#252628" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <rect x="60" y="40" width="280" height="320" rx="65" fill="url(#baseGrad)" filter="url(#shadow)" />

  <path d="M 60 290
           C 60 335, 105 360, 150 360
           L 250 360
           C 295 360, 340 335, 340 290
           L 310 260
           C 310 265, 290 275, 260 275
           L 140 275
           C 110 275, 90 265, 90 260
           Z"
        fill="url(#frontSlope)" />

  <rect x="90" y="55" width="220" height="215" rx="40" fill="url(#topGrad)" />

  <rect x="90" y="55" width="220" height="215" rx="40" fill="none" stroke="url(#innerHighlight)" stroke-width="2" />

  <rect x="94" y="59" width="212" height="203" rx="36" fill="none" stroke="#1f2022" stroke-width="1.5" stroke-opacity="0.5" />
</svg>
